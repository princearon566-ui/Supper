<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown to 7:00 PM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Using supper.png as requested with a fallback gradient */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('supper.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
        }

        .unit-label {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.8;
        }
    </style>
</head>
<body class="flex items-center justify-center text-white p-4">

    <div class="bg-image"></div>

    <div class="glass-card p-8 md:p-12 text-center max-w-lg w-full shadow-2xl">
        <h1 class="text-2xl md:text-3xl font-light mb-8 tracking-wide">Dinner is Served At 7:00 PM</h1>
        
        <div id="timer" class="flex justify-center gap-4 md:gap-8">
            <div class="flex flex-col">
                <span id="hours" class="text-5xl md:text-7xl font-bold tabular-nums">00</span>
                <span class="unit-label mt-2">Hours</span>
            </div>
            <div class="text-5xl md:text-7xl font-light opacity-50">:</div>
            <div class="flex flex-col">
                <span id="minutes" class="text-5xl md:text-7xl font-bold tabular-nums">00</span>
                <span class="unit-label mt-2">Minutes</span>
            </div>
            <div class="text-5xl md:text-7xl font-light opacity-50">:</div>
            <div class="flex flex-col">
                <span id="seconds" class="text-5xl md:text-7xl font-bold tabular-nums">00</span>
                <span class="unit-label mt-2">Seconds</span>
            </div>
        </div>

        <div id="message" class="hidden mt-8 text-2xl font-medium text-yellow-400 animate-pulse">
            Dinner Time! 🍽️
        </div>
    </div>

    <script>
        function updateCountdown() {
            // Target time: 7:00 PM (19:00) today in New York
            const now = new Date();
            const target = new Date();
            target.setHours(19, 0, 0, 0);

            // If it's already past 7 PM today, we could show 0 or target tomorrow. 
            // For this request, we'll assume "today".
            let diff = target - now;

            if (diff <= 0) {
                document.getElementById('hours').innerText = '00';
                document.getElementById('minutes').innerText = '00';
                document.getElementById('seconds').innerText = '00';
                document.getElementById('message').classList.remove('hidden');
                return;
            }

            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
        }

        // Run every second
        setInterval(updateCountdown, 1000);
        updateCountdown(); // Initial call
    </script>
</body>
</html>
